version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: mobalance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mobalance
      POSTGRES_PASSWORD: mobalance
      POSTGRES_DB: mobalance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobalance -d mobalance"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mobalance_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mobalance.pt
      PGADMIN_DEFAULT_PASSWORD: mobalance
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
